services:
  web:
    build: .
    command: bash -lc "scripts/run_web.sh"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - environments/base.env
      - environments/dev_docker.env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    env_file:
      - environments/base.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
